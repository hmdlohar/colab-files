<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>{{ title or "Colab Files" }}</title>
    <link rel="stylesheet" href="{{ url_for('static', path='styles.css') }}" />
    <script defer src="{{ url_for('static', path='app.js') }}"></script>
  </head>
  <body {% if job %}data-job-id="{{ job.id }}"{% endif %}>
    <div class="shell">
      <aside class="sidebar">
        <div class="brand">
          <h1>Colab Files</h1>
          <p>Media tools with upload, API, and download flows.</p>
        </div>
        <nav class="nav">
          <a href="/" class="{% if request.url.path == '/' %}active{% endif %}">Home</a>
          <a href="/tools/audio-to-transcript" class="{% if request.url.path == '/tools/audio-to-transcript' %}active{% endif %}">Audio to Transcript</a>
          <a href="/tools/video-to-shrinked-video" class="{% if request.url.path == '/tools/video-to-shrinked-video' %}active{% endif %}">Video to Shrinked Video</a>
          <a href="/api/tools">API Catalog</a>
        </nav>
        <div style="margin-top: 24px" class="stack">
          <small>Planned</small>
          <div class="pill">Denoiser</div>
          <div class="pill">Batch Whisper</div>
        </div>
      </aside>
      <main class="content">
        {% block content %}{% endblock %}
      </main>
    </div>
  </body>
</html>
